<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo Suporte — Quadro de Tarefas</title>
<style>
  :root {
    --fluxo: #2563eb;
    --fluxo-dark: #1d4ed8;
    --fluxo-light: #dbeafe;
    --bg: #f1f5f9;
    --card: #fff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --todo: #f8fafc;
    --doing-bg: #fffbeb;
    --doing-border: #fbbf24;
    --done-bg: #f0fdf4;
    --done-border: #22c55e;
    --backlog-bg: #f8fafc;
    --backlog-border: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--fluxo), var(--fluxo-dark));
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(37,99,235,0.2);
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 2px; }
  .stats {
    display: flex; gap: 20px; font-size: 13px;
  }
  .stats .stat {
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }
  .stats .stat strong { font-size: 18px; margin-right: 4px; }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .column {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    min-height: 400px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .column-header {
    padding: 14px 16px;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
  }
  .column-header .count {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .col-backlog .column-header { border-color: var(--backlog-border); color: #475569; }
  .col-todo .column-header { border-color: var(--fluxo); color: var(--fluxo); }
  .col-doing .column-header { border-color: var(--doing-border); color: #b45309; }
  .col-done .column-header { border-color: var(--done-border); color: #16a34a; }

  .column-body {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 100px;
  }
  .column-body.drag-over {
    background: var(--fluxo-light);
    border-radius: 0 0 12px 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transform: translateY(-1px);
  }
  .card.dragging {
    opacity: 0.4;
    transform: rotate(2deg);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .tag-p0 { background: #fee2e2; color: #991b1b; }
  .tag-p1 { background: #ffedd5; color: #9a3412; }
  .tag-p2 { background: #dbeafe; color: #1e40af; }
  .tag-feat { background: #f0fdf4; color: #166534; }
  .tag-fix { background: #fef3c7; color: #92400e; }
  .tag-infra { background: #f3e8ff; color: #6b21a8; }
  .tag-docs { background: #e0f2fe; color: #075985; }
  .tag-test { background: #fce7f3; color: #9d174d; }
  .card-date {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
  }
  /* Add task */
  .add-btn {
    margin: 8px 12px 12px;
    padding: 8px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .add-btn:hover {
    border-color: var(--fluxo);
    color: var(--fluxo);
    background: var(--fluxo-light);
  }
  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary {
    background: var(--fluxo);
    color: #fff;
    border-color: var(--fluxo);
  }
  .btn-primary:hover { background: var(--fluxo-dark); }
  .btn-danger {
    background: #fee2e2;
    color: #991b1b;
    border-color: #fecaca;
  }
  .btn-danger:hover { background: #fecaca; }
  /* Progress bar */
  .progress-bar {
    margin: 0 32px 0 32px;
    padding: 12px 0;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #22c55e;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 4px;
  }
  /* Delete button on card */
  .card-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .card:hover .card-delete { display: flex; }
  .card-delete:hover { background: #fee2e2; color: #991b1b; }
  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Fluxo Suporte — Quadro de Tarefas</h1>
    <div class="subtitle">Arraste as tarefas entre colunas · Clique em + para adicionar</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="progress-bar" style="width:200px;margin:0">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="stats">
      <div class="stat"><strong id="statTotal">0</strong>total</div>
      <div class="stat"><strong id="statDone">0</strong>concluídas</div>
    </div>
  </div>
</header>

<div class="board">
  <!-- Backlog -->
  <div class="column col-backlog">
    <div class="column-header">Backlog <span class="count" id="countBacklog">0</span></div>
    <div class="column-body" data-col="backlog" id="colBacklog"></div>
    <button class="add-btn" onclick="openModal('backlog')">+ Adicionar</button>
  </div>
  <!-- A Fazer -->
  <div class="column col-todo">
    <div class="column-header">A Fazer <span class="count" id="countTodo">0</span></div>
    <div class="column-body" data-col="todo" id="colTodo"></div>
    <button class="add-btn" onclick="openModal('todo')">+ Adicionar</button>
  </div>
  <!-- Em Andamento -->
  <div class="column col-doing">
    <div class="column-header">Em Andamento <span class="count" id="countDoing">0</span></div>
    <div class="column-body" data-col="doing" id="colDoing"></div>
    <button class="add-btn" onclick="openModal('doing')">+ Adicionar</button>
  </div>
  <!-- Concluído -->
  <div class="column col-done">
    <div class="column-header">Concluído <span class="count" id="countDone">0</span></div>
    <div class="column-body" data-col="done" id="colDone"></div>
    <button class="add-btn" onclick="openModal('done')">+ Adicionar</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Nova Tarefa</h3>
    <label>Título</label>
    <input id="taskTitle" placeholder="Ex: Implementar busca global" />
    <label>Descrição (opcional)</label>
    <textarea id="taskDesc" placeholder="Detalhes da tarefa..."></textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <label>Prioridade</label>
        <select id="taskPrio">
          <option value="p0">P0 — Crítico</option>
          <option value="p1" selected>P1 — Alto</option>
          <option value="p2">P2 — Médio</option>
        </select>
      </div>
      <div>
        <label>Tipo</label>
        <select id="taskType">
          <option value="feat">Feature</option>
          <option value="fix">Correção</option>
          <option value="infra">Infra</option>
          <option value="docs">Docs</option>
          <option value="test">Teste</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'fluxo-suporte-tasks-v1';

// Tarefas iniciais do audit
const DEFAULT_TASKS = [
  // Concluídas
  { id: 'd1', title: 'Schema Prisma — novos modelos (AuditLog, Notification, ResponseTemplate, PasswordResetToken)', col: 'done', prio: 'p0', type: 'feat', date: '2026-04-10' },
  { id: 'd2', title: 'Migration SQL com enums e índices', col: 'done', prio: 'p0', type: 'infra', date: '2026-04-10' },
  { id: 'd3', title: 'Libs: rate-limit, logger, audit, sla, password-token, notifications, upload', col: 'done', prio: 'p0', type: 'feat', date: '2026-04-10' },
  { id: 'd4', title: 'Email invite + primeiro-acesso + esqueci-senha', col: 'done', prio: 'p0', type: 'feat', date: '2026-04-10' },
  { id: 'd5', title: 'Rate limit + SLA + audit nas ticket actions', col: 'done', prio: 'p0', type: 'feat', date: '2026-04-10' },
  { id: 'd6', title: 'API notifications + sino + crons (auto-close, sla-check)', col: 'done', prio: 'p0', type: 'feat', date: '2026-04-10' },
  { id: 'd7', title: 'SLA badge + filtros SLA na listagem', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-10' },
  { id: 'd8', title: 'Templates de resposta — CRUD + ReplyForm + wiring', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-11' },
  { id: 'd9', title: 'Busca global /api/search + Ctrl+K CommandPalette', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-11' },
  { id: 'd10', title: 'Toast provider + SubmitButton + ThemeToggle', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-11' },
  { id: 'd11', title: 'Relatórios CSV (chamados, clientes, desempenho)', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-11' },
  { id: 'd12', title: 'Upload API com validateUpload integrado', col: 'done', prio: 'p1', type: 'feat', date: '2026-04-11' },
  { id: 'd13', title: 'Guia DNS SPF/DKIM/DMARC', col: 'done', prio: 'p2', type: 'docs', date: '2026-04-11' },
  { id: 'd14', title: 'Vitest + testes (SLA, upload, CSV)', col: 'done', prio: 'p1', type: 'test', date: '2026-04-11' },
  { id: 'd15', title: 'CI workflow (lint + typecheck + test + build)', col: 'done', prio: 'p1', type: 'infra', date: '2026-04-11' },
  { id: 'd16', title: 'README atualizado', col: 'done', prio: 'p2', type: 'docs', date: '2026-04-11' },
  { id: 'd17', title: 'Fix pino-pretty webpack error no logger.ts', col: 'done', prio: 'p0', type: 'fix', date: '2026-04-11' },
  // Próximas iterações (backlog)
  { id: 'b1', title: 'Integração Chatwoot — sync de tickets', col: 'backlog', prio: 'p2', type: 'feat', date: '' },
  { id: 'b2', title: 'Dashboard de relatórios com gráficos', col: 'backlog', prio: 'p2', type: 'feat', date: '' },
  { id: 'b3', title: 'Webhook para integrações externas', col: 'backlog', prio: 'p2', type: 'feat', date: '' },
  { id: 'b4', title: 'Multi-idioma (i18n)', col: 'backlog', prio: 'p2', type: 'feat', date: '' },
  { id: 'b5', title: 'App mobile (React Native)', col: 'backlog', prio: 'p2', type: 'feat', date: '' },
];

let tasks = [];
let currentCol = 'todo';
let draggedId = null;

function load() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { tasks = JSON.parse(stored); } catch { tasks = [...DEFAULT_TASKS]; }
  } else {
    tasks = [...DEFAULT_TASKS];
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function render() {
  const cols = { backlog: [], todo: [], doing: [], done: [] };
  tasks.forEach(t => {
    if (!cols[t.col]) cols[t.col] = [];
    cols[t.col].push(t);
  });

  Object.keys(cols).forEach(col => {
    const el = document.getElementById('col' + col.charAt(0).toUpperCase() + col.slice(1));
    el.innerHTML = cols[col].map(t => cardHtml(t)).join('');
    document.getElementById('count' + col.charAt(0).toUpperCase() + col.slice(1)).textContent = cols[col].length;
  });

  // Stats
  const total = tasks.length;
  const done = cols.done.length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '% concluído';

  // Drag events
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedId = e.target.dataset.id;
      e.target.classList.add('dragging');
    });
    card.addEventListener('dragend', e => {
      e.target.classList.remove('dragging');
      draggedId = null;
    });
  });

  document.querySelectorAll('.column-body').forEach(body => {
    body.addEventListener('dragover', e => {
      e.preventDefault();
      body.classList.add('drag-over');
    });
    body.addEventListener('dragleave', e => {
      body.classList.remove('drag-over');
    });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      if (!draggedId) return;
      const newCol = body.dataset.col;
      const task = tasks.find(t => t.id === draggedId);
      if (task) {
        task.col = newCol;
        if (newCol === 'done' && !task.date) task.date = new Date().toISOString().slice(0, 10);
        save();
        render();
      }
    });
  });
}

function cardHtml(t) {
  const prioClass = 'tag tag-' + t.prio;
  const typeClass = 'tag tag-' + t.type;
  const prioLabel = { p0: 'P0', p1: 'P1', p2: 'P2' }[t.prio] || '';
  const typeLabel = { feat: 'Feature', fix: 'Fix', infra: 'Infra', docs: 'Docs', test: 'Teste' }[t.type] || '';
  return `
    <div class="card" draggable="true" data-id="${t.id}">
      <button class="card-delete" onclick="deleteTask('${t.id}')" title="Remover">&times;</button>
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        <span class="${prioClass}">${prioLabel}</span>
        <span class="${typeClass}">${typeLabel}</span>
        ${t.date ? `<span class="card-date">${t.date}</span>` : ''}
      </div>
    </div>
  `;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function openModal(col) {
  currentCol = col;
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('modalTitle').textContent = 'Nova Tarefa';
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const task = {
    id: 't' + Date.now(),
    title,
    desc: document.getElementById('taskDesc').value.trim(),
    col: currentCol,
    prio: document.getElementById('taskPrio').value,
    type: document.getElementById('taskType').value,
    date: new Date().toISOString().slice(0, 10),
  };
  tasks.push(task);
  save();
  render();
  closeModal();
}

function deleteTask(id) {
  if (!confirm('Remover esta tarefa?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

// Esc to close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Init
load();
render();
</script>
</body>
</html>
